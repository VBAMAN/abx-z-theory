<svg width="600" height="200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .label { font: 14px sans-serif; fill: #333; }
    .title { font: bold 16px sans-serif; }
    .xzone { fill: #ffe08a; stroke: #e0a800; stroke-width: 2; }
    .node { fill: #f0f0f0; stroke: #999; stroke-width: 1; }
    .arrow { stroke: #555; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"></polygon>
    </marker>
  </defs>

  <!-- Title -->
  <text x="200" y="25" class="title">ABX-Z Theory</text>

  <!-- Nodes -->
  <rect x="50" y="100" width="100" height="40" class="node"></rect>
  <text x="65" y="125" class="label">B (Fail)</text>

  <rect x="250" y="100" width="100" height="40" class="node"></rect>
  <text x="265" y="125" class="label">A (Success)</text>

  <rect x="450" y="100" width="120" height="40" class="node"></rect>
  <text x="460" y="125" class="label">A+ (Mastery)</text>

  <!-- X Zone -->
  <ellipse cx="200" cy="80" rx="70" ry="30" class="xzone"></ellipse>
  <text x="160" y="85" class="label">X (Tension)</text>

  <!-- Arrows -->
  <line x1="150" y1="120" x2="250" y2="120" class="arrow"></line>
  <line x1="350" y1="120" x2="450" y2="120" class="arrow"></line>

  <!-- Player label -->
  <text x="170" y="160" class="label">Player operates here</text>

  <!-- Z note -->
  <text x="50" y="180" class="label">
    Z: Presentation &amp; feedback (no direct effect on outcome)
  </text>
</svg>